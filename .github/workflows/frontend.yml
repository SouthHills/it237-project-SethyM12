name: Push Frontend Image to ACR
on:
  push:
    paths:
      - project_frontend
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/project_frontend:latest -t ${{ secrets.ACR_LOGIN_SERVER }}/project_frontend:${{ github.sha }} .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/project_frontend:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/project_frontend:${{ github.sha }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_FRONTEND_APP_NAME }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/project_frontend:${{ github.sha }}
          registry-login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          registry-username: ${{ secrets.ACR_USERNAME }}
          registry-password: ${{ secrets.ACR_PASSWORD }}