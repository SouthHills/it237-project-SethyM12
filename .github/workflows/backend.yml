name: Push Backend Image to ACR
on:
  push:
    paths:
      - 'project_backend/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/samples/project_backend:latest -t ${{ secrets.ACR_LOGIN_SERVER }}/samples/project_backend:${{ github.sha }} ./project_backend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/samples/project_backend:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/samples/project_backend:${{ github.sha }}