<div>
  <app-manager-navbar />
  @if(errorMessage())
  {
    <h3 class="text-danger">{{ errorMessage() }}</h3>
  }

  @if(!errorMessage())
  {
    <table class="table table-striped table-bordered align-middle">
      <thead class="table-light">
      <tr>
        <th>PART_ID</th>
        <th>PART_NAME</th>
        <th>PART_QTY</th>
        <th>PART_SPECS</th>
        <th>VENDOR_ID</th>
      </tr>
      </thead>
      <tbody>
      <tr>
        <td>
          <span class="text-muted">Auto</span>
        </td>
        <td>
          <input class="form-control" id="name" type="text" placeholder="Name"
                 [(ngModel)]="partObject.partName"
                 required />
        </td>
        <td>
          <input class="form-control" id="quantity" type="number" placeholder="Quantity"
                 [(ngModel)]="partObject.partQuantity"
                 required/>
        </td>

        <td>
          <input class="form-control" id="specs" type="text" placeholder="Specs"
                 [(ngModel)]="partObject.partSpecs"
                 required />
        </td>
        <td>
          <input class="form-control" id="" type="number" placeholder="plantId"
                 [(ngModel)]="partObject.vendorId"
                 required />
        </td>
        <td class="text-end">
          <form id="createComponentForm">
            <button type="submit" class="btn btn-sm btn-success" (click)="createPart()">Create</button>
          </form>
        </td>
      </tr>
        @for (part of parts(); track part.partId) {
          <tr>
            <td>
              {{ part.partId }}
            </td>
            <td>
              <input [(ngModel)]="part.partName"   />
            </td>
            <td>
              <input [(ngModel)]="part.partQuantity" />
            </td>
            <td>
              <input [(ngModel)]="part.partSpecs"  />
            </td>
            <td>
              <input [(ngModel)]="part.vendorId"  />
            </td>

            <td class="d-flex justify-content-end gap-2">
              <button class="btn btn-primary" (click)="updatePart(part.partId, part)">Update</button>
              <button class="btn btn-danger" (click)="deletePart(part.partId)">Delete</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  }
</div>
