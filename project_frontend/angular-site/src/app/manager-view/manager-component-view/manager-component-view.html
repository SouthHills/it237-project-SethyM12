<div>
  <app-manager-navbar />
  @if(errorMessage())
  {
    <h3 class="text-danger">{{ errorMessage() }}</h3>
  }
  @if(!errorMessage())
  {
    <table class="table table-striped table-bordered align-middle">
      <thead class="table-light">
      <tr>
        <th>COMP_ID</th>
        <th>COMP_NAME</th>
        <th>COMP_QTY</th>
        <th>COMP_SPECS</th>
        <th>PLANT_ID</th>
      </tr>
      </thead>
      <tbody>
      <tr>
        <td>
          <span class="text-muted">Auto</span>
        </td>
        <td>
          <input class="form-control" id="name" type="text" placeholder="Name"
                 [(ngModel)]="componentObject.compName"
                 required />
        </td>
        <td>
          <input class="form-control" id="quantity" type="number" placeholder="Quantity"
                 [(ngModel)]="componentObject.compQuantity"
                 required/>
        </td>

        <td>
          <input class="form-control" id="specs" type="text" placeholder="Specs"
                 [(ngModel)]="componentObject.compSpecs"
                 required />
        </td>
        <td>
          <input class="form-control" id="" type="number" placeholder="plantId"
                 [(ngModel)]="componentObject.plantId"
                 required />
        </td>
        <td class="text-end">
          <form id="createComponentForm">
            <button type="submit" class="btn btn-sm btn-success" (click)="createComponent()">Create</button>
          </form>
        </td>
      </tr>
        @for (component of components(); track component.compId) {
          <tr>
            <td>
              {{ component.compId }}
            </td>
            <td>
              <input [(ngModel)]="component.compName"/>
            </td>
            <td>
              <input [(ngModel)]="component.compQuantity" />
            </td>
            <td>
              <input [(ngModel)]="component.compSpecs" />
            </td>
            <td>
              <input [(ngModel)]="component.plantId" />
            </td>

            <td class="d-flex justify-content-end gap-2">
              <button class="btn btn-primary" (click)="updateComponent(component.compId, component)">Update</button>
              <button class="btn btn-danger" (click)="deleteComponent(component.compId)">Delete</button>
            </td>

          </tr>
        }


      </tbody>
    </table>
  }
</div>
