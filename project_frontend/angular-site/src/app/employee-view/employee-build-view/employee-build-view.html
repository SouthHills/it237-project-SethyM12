<div>
  <app-employee-navbar />
  @if(errorMessage())
  {
    <h3 class="text-danger">{{ errorMessage() }}</h3>
  }
  @if(!errorMessage())
  {
    <table class="table table-striped table-bordered align-middle">
      <thead class="table-light">
      <tr>
        <th>COMP ID</th>
        <th>PART ID</th>
      </tr>
      </thead>
      <tbody>
        @for (build of builds(); track build) {
          <tr>
            <td>{{ build.compId }}</td>
            <td>{{ build.partId }}</td>
          </tr>
        }
      </tbody>
    </table>
  }
</div>
