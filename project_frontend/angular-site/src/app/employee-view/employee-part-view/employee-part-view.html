<div>
  <app-employee-navbar />
  @if(errorMessage())
  {
    <h3 class="text-danger">{{ errorMessage() }}</h3>
  }
  @if(!errorMessage())
  {
    <table class="table table-striped table-bordered align-middle">
      <thead class="table-light">
      <tr>
        <th>PART ID</th>
        <th>PART NAME</th>
        <th>PART QUANTITY</th>
        <th>PART SPECS</th>
        <th>VENDOR ID</th>
      </tr>
      </thead>
      <tbody>
        @for (part of parts(); track part.partId) {
          <tr>
            <td>{{ part.partId }}</td>
            <td>{{ part.partName }}</td>
            <td>{{ part.partQuantity }}</td>
            <td>{{ part.partSpecs }}</td>
            <td>{{ part.vendorId }}</td>
          </tr>
        }
      </tbody>
    </table>
  }

</div>
